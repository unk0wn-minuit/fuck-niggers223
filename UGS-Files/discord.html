<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Discord</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#23272a;overflow:hidden;}
  iframe{width:100%;height:100%;border:none;display:block;}
  .err{display:none;flex-direction:column;align-items:center;justify-content:center;
    height:100%;color:#dcddde;font-family:'Segoe UI',sans-serif;text-align:center;padding:24px;}
  .err .ico{font-size:48px;margin-bottom:16px;}
  .err p{font-size:14px;margin-bottom:20px;color:#8e9297;}
  .err a{color:#7289da;text-decoration:none;padding:10px 24px;border:1px solid #7289da;
    border-radius:24px;font-size:13px;}
  .err a:hover{background:#7289da;color:#fff;}
</style>
</head>
<body>
<iframe
  src="https://mescord.jakobb.se"
  allow="microphone; camera; fullscreen; clipboard-read; clipboard-write"
  allowfullscreen
  sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads"
  id="discordFrame"
></iframe>
<div class="err" id="errMsg">
  <div class="ico">🟣</div>
  <p>Could not load Discord. You can open it directly instead.</p>
  <a href="https://mescord.jakobb.se" target="_blank">Open Discord ↗</a>
</div>
<script>
  var f=document.getElementById('discordFrame');
  f.onerror=function(){
    f.style.display='none';
    document.getElementById('errMsg').style.display='flex';
  };
</script>
</body>
</html>
